<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to the Harvard Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400;1,14..32,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    /* ─── Background Grid ─── */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: 
        linear-gradient(0deg, transparent 24%, rgba(255,255,255,.05) 25%, rgba(255,255,255,.05) 26%, transparent 27%, transparent 74%, rgba(255,255,255,.05) 75%, rgba(255,255,255,.05) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(255,255,255,.05) 25%, rgba(255,255,255,.05) 26%, transparent 27%, transparent 74%, rgba(255,255,255,.05) 75%, rgba(255,255,255,.05) 76%, transparent 77%, transparent);
      background-size: 50px 50px;
      animation: gridShift 8s linear infinite;
    }

    @keyframes gridShift {
      0% { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    /* ─── Glow Orbs ─── */
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 20s ease-in-out infinite;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: rgba(100, 200, 255, 0.4);
      top: 10%; left: 10%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: rgba(255, 100, 200, 0.3);
      bottom: 10%; right: 10%;
      animation-delay: 5s;
    }

    .orb-3 {
      width: 250px; height: 250px;
      background: rgba(100, 255, 200, 0.25);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }

    /* ─── Main Container ─── */
    .stage {
      position: relative;
      z-index: 10;
      width: 100%; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    /* ─── Content ─── */
    .welcome-content {
      max-width: 800px;
      opacity: 1;
      animation: fadeInContent 1.2s ease-out forwards;
    }

    @keyframes fadeInContent {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Headline with Animated Text ─── */
    .welcome-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 600;
      font-style: italic;
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow: 0 0 40px rgba(100, 200, 255, 0.3);
      margin-bottom: 24px;
      line-height: 1.1;
      word-spacing: 0.1em;
    }

    /* ─── Animated word effect ─── */
    .word {
      display: inline-block;
      animation: wordFloat 3s ease-in-out infinite;
      margin: 0 0.15em;
    }

    .word:nth-child(1) { animation-delay: 0s; }
    .word:nth-child(2) { animation-delay: 0.2s; }
    .word:nth-child(3) { animation-delay: 0.4s; }
    .word:nth-child(4) { animation-delay: 0.6s; }

    @keyframes wordFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* ─── Subtitle ─── */
    .welcome-subtitle {
      font-size: clamp(16px, 2.2vw, 22px);
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 48px;
      line-height: 1.6;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* ─── Touch Button ─── */
    .touch-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 48px;
      background: linear-gradient(135deg, rgba(100, 200, 255, 0.2), rgba(255, 100, 200, 0.2));
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: clamp(14px, 1.8vw, 18px);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(100, 200, 255, 0.15);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { 
        box-shadow: 0 0 30px rgba(100, 200, 255, 0.15);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 0 50px rgba(100, 200, 255, 0.35);
        transform: scale(1.02);
      }
    }

    .touch-btn:hover {
      background: linear-gradient(135deg, rgba(100, 200, 255, 0.4), rgba(255, 100, 200, 0.4));
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 60px rgba(100, 200, 255, 0.5);
      transform: translateY(-2px);
    }

    .touch-btn:active {
      transform: translateY(0);
    }

    /* ─── Hint Text ─── */
    .hint-text {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeInHint 1.5s ease-out forwards 0.5s;
      opacity: 0;
    }

    @keyframes fadeInHint {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ─── Fade out transition ─── */
    .fade-out {
      animation: fadeOut 0.8s ease-out forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-40px); }
    }

    /* ─── Mobile ─── */
    @media (max-width: 640px) {
      .welcome-headline {
        font-size: 42px;
      }
      .welcome-subtitle {
        font-size: 16px;
      }
      .touch-btn {
        padding: 14px 32px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Grid -->
  <div class="bg-grid"></div>

  <!-- Glow Orbs -->
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  <div class="glow-orb orb-3"></div>

  <!-- Main Stage -->
  <main class="stage">
    <div class="welcome-content">
      <h1 class="welcome-headline">
        <span class="word">welcome</span>
        <span class="word">to</span>
        <span class="word">the</span>
        <span class="word">harvard</span>
        <span class="word">race</span>
      </h1>
      
      <p class="welcome-subtitle">7 days. infinite challenges. earn stars to win.</p>
      
      <button class="touch-btn" id="touchBtn">touch to begin</button>
      
      <p class="hint-text">or press any key</p>
    </div>
  </main>

  <script>
    const touchBtn = document.getElementById('touchBtn');
    const content = document.querySelector('.welcome-content');

    function transitionToGate() {
      content.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = '/gate';
      }, 800);
    }

    touchBtn.addEventListener('click', transitionToGate);
    document.addEventListener('keydown', transitionToGate);
  </script>

</body>
</html>

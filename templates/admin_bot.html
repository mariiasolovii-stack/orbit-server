<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Control Panel - Orbit Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f8f9fa;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 32px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: #0066cc;
      color: #fff;
    }

    .btn-primary:hover {
      background: #0052a3;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-danger {
      background: #dc3545;
      color: #fff;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Message Log */
    .message-log {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .log-entry {
      padding: 8px;
      margin-bottom: 8px;
      background: #fff;
      border-left: 3px solid #0066cc;
      border-radius: 4px;
    }

    .log-entry.success {
      border-left-color: #28a745;
    }

    .log-entry.error {
      border-left-color: #dc3545;
    }

    .log-time {
      color: #999;
      font-size: 11px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }

    /* Status Badge */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pending { background: #fff4e6; color: #d9480f; }
    .status-sent { background: #ebfbee; color: #2b8a3e; }
    .status-error { background: #fff5f5; color: #c92a2a; }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th {
      background: #f1f3f5;
      padding: 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: #495057;
      text-transform: uppercase;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #f1f3f5;
      font-size: 13px;
    }

    tr:hover td {
      background: #f8f9fa;
    }

    /* Alert */
    .alert {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.show { display: block; }

    .alert-success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .alert-error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Bot Control Panel</h1>
      <a href="/leaderboard" style="font-size: 14px; color: #666;">View Leaderboard</a>
    </div>

    <!-- Alerts -->
    <div id="alertBox"></div>

    <!-- Game Schedule -->
    <div class="card">
      <div class="card-title">Game Schedule</div>
      <div class="grid">
        <div class="form-group">
          <label>Game Start Date</label>
          <input type="date" id="startDate" value="2026-05-02" />
        </div>
        <div class="form-group">
          <label>Game End Date</label>
          <input type="date" id="endDate" value="2026-05-13" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveGameSchedule()">Save Schedule</button>
    </div>

    <!-- Manual Message Triggers -->
    <div class="card">
      <div class="card-title">Send Messages</div>
      
      <div class="form-group">
        <label>Message Type</label>
        <select id="messageType" onchange="updateMessageTemplate()">
          <option value="acceptance">Team Acceptance</option>
          <option value="quest_batch">Quest Batch Release</option>
          <option value="reminder">Daily Reminder</option>
          <option value="custom">Custom Message</option>
        </select>
      </div>

      <div class="form-group">
        <label>Message Template</label>
        <textarea id="messageTemplate" placeholder="Message will appear here..."></textarea>
      </div>

      <div class="form-group">
        <label>Send To (Team Name or 'all')</label>
        <input type="text" id="sendToTeam" placeholder="all" />
      </div>

      <div class="button-group">
        <button class="btn btn-primary" onclick="sendMessage()">Send Now</button>
        <button class="btn btn-secondary" onclick="scheduleMessage()">Schedule</button>
      </div>
    </div>

    <!-- Quest Batch Management -->
    <div class="card">
      <div class="card-title">Quest Batches</div>
      
      <div class="grid">
        <div class="form-group">
          <label>Batch Number</label>
          <input type="number" id="batchNum" min="1" max="5" value="1" />
        </div>
        <div class="form-group">
          <label>Release Time (11:59pm)</label>
          <input type="date" id="batchDate" />
        </div>
      </div>

      <div class="form-group">
        <label>Quests in This Batch (comma-separated IDs)</label>
        <input type="text" id="batchQuests" placeholder="1,2,3,4,5" />
      </div>

      <button class="btn btn-primary" onclick="createBatch()">Create Batch</button>

      <table style="margin-top: 24px;">
        <thead>
          <tr>
            <th>Batch</th>
            <th>Release Date</th>
            <th>Quests</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="batchList">
          <!-- Populated by JavaScript -->
        </tbody>
      </table>
    </div>

    <!-- Message Log -->
    <div class="card">
      <div class="card-title">Message Log</div>
      <button class="btn btn-secondary" onclick="refreshLog()" style="margin-bottom: 16px;">Refresh</button>
      <div class="message-log" id="messageLog">
        <div class="log-entry">Waiting for messages...</div>
      </div>
    </div>

    <!-- Team List -->
    <div class="card">
      <div class="card-title">Teams & Quick Actions</div>
      <div style="max-height: 400px; overflow-y: auto;">
        <table>
          <thead>
            <tr>
              <th>Team Name</th>
              <th>Members</th>
              <th>Secret Code</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="teamList">
            <!-- Populated by API -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Recent Submissions -->
    <div class="card">
      <div class="card-title">Recent Submissions</div>
      <table>
        <thead>
          <tr>
            <th>Team</th>
            <th>Quest</th>
            <th>Stars</th>
            <th>Submitted</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="submissionList">
          <!-- Populated by API -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const messageTemplates = {
      acceptance: `Welcome to Orbit! You've been accepted into the Harvard Race 🏁

You're competing against other Harvard teams for 10 days.
Rules: joinorbit.one/about
Your team secret code: [TEAM_CODE]`,
      quest_batch: `🎯 NEW QUESTS AVAILABLE

Choose any and submit by end of Day 2.
Submit here: joinorbit.one/submit
Team code: [TEAM_CODE]`,
      reminder: `⏰ REMINDER: Submit your completed quests!
Leaderboard: joinorbit.one/leaderboard`,
      custom: ``
    };

    function updateMessageTemplate() {
      const type = document.getElementById('messageType').value;
      document.getElementById('messageTemplate').value = messageTemplates[type] || '';
    }

    function showAlert(message, type = 'success') {
      const alertBox = document.getElementById('alertBox');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type} show`;
      alert.textContent = message;
      alertBox.appendChild(alert);
      setTimeout(() => alert.remove(), 5000);
    }

    async function sendMessage() {
      const type = document.getElementById('messageType').value;
      const message = document.getElementById('messageTemplate').value;
      const team = document.getElementById('sendToTeam').value || 'all';

      if (!message.trim()) {
        showAlert('Please enter a message', 'error');
        return;
      }

      try {
        const response = await fetch('/api/admin/send-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, message, team })
        });

        const result = await response.json();
        if (result.success) {
          showAlert(`Message sent to ${result.count} team(s)!`);
          refreshLog();
        } else {
          showAlert(result.error || 'Failed to send message', 'error');
        }
      } catch (error) {
        showAlert('Error sending message', 'error');
      }
    }

    async function scheduleMessage() {
      showAlert('Scheduling feature coming soon', 'error');
    }

    async function createBatch() {
      const batchNum = document.getElementById('batchNum').value;
      const batchDate = document.getElementById('batchDate').value;
      const quests = document.getElementById('batchQuests').value;

      if (!batchDate || !quests) {
        showAlert('Please fill in all fields', 'error');
        return;
      }

      try {
        const response = await fetch('/api/admin/create-batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ batch_num: parseInt(batchNum), release_date: batchDate, quests: quests.split(',').map(q => parseInt(q.trim())) })
        });

        const result = await response.json();
        if (result.success) {
          showAlert('Batch created!');
          loadBatches();
        } else {
          showAlert(result.error || 'Failed to create batch', 'error');
        }
      } catch (error) {
        showAlert('Error creating batch', 'error');
      }
    }

    async function loadBatches() {
      try {
        const response = await fetch('/api/admin/batches');
        const batches = await response.json();
        const list = document.getElementById('batchList');
        list.innerHTML = batches.map(b => `
          <tr>
            <td>Batch ${b.batch_num}</td>
            <td>${new Date(b.release_date).toLocaleDateString()}</td>
            <td>${b.quests || 'N/A'}</td>
            <td><span class="status-badge status-pending">Scheduled</span></td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading batches:', error);
      }
    }

    async function refreshLog() {
      try {
        const response = await fetch('/api/admin/message-log');
        const messages = await response.json();
        const log = document.getElementById('messageLog');
        log.innerHTML = messages.map(m => `
          <div class="log-entry ${m.status === 'sent' ? 'success' : 'error'}">
            <span class="log-time">${new Date(m.created_at).toLocaleTimeString()}</span> - 
            ${m.team_name}: ${m.message_text}
            <span class="status-badge status-${m.status}">${m.status}</span>
          </div>
        `).join('') || '<div class="log-entry">No messages yet</div>';
      } catch (error) {
        console.error('Error loading log:', error);
      }
    }

    async function loadSubmissions() {
      try {
        const response = await fetch('/api/admin/recent-submissions');
        const submissions = await response.json();
        const list = document.getElementById('submissionList');
        list.innerHTML = submissions.map(s => `
          <tr>
            <td>${s.team_name}</td>
            <td>${s.quest_name}</td>
            <td>+${s.stars}</td>
            <td>${new Date(s.created_at).toLocaleString()}</td>
            <td><span class="status-badge status-sent">${s.status}</span></td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading submissions:', error);
      }
    }

    async function saveGameSchedule() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      try {
        const response = await fetch('/api/admin/game-schedule', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start_date: startDate, end_date: endDate })
        });

        const result = await response.json();
        if (result.success) {
          showAlert('Game schedule saved!');
        } else {
          showAlert(result.error || 'Failed to save schedule', 'error');
        }
      } catch (error) {
        showAlert('Error saving schedule', 'error');
      }
    }

    async function loadTeams() {
      try {
        const response = await fetch('/api/admin/teams');
        const teams = await response.json();
        const list = document.getElementById('teamList');
        list.innerHTML = teams.map(t => {
          const members = [t.name, t.t1_name, t.t2_name, t.t3_name].filter(Boolean).join(', ');
          return `
            <tr>
              <td><strong>${t.team_name}</strong></td>
              <td>${members}</td>
              <td><code>${t.team_secret_code}</code></td>
              <td>
                <button class="btn btn-secondary" style="padding: 4px 8px; font-size: 10px;" 
                  onclick="sendWelcomeToTeam('${t.team_name}', '${t.team_secret_code}')">
                  Send Welcome
                </button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (error) {
        console.error('Error loading teams:', error);
      }
    }

    async function sendWelcomeToTeam(teamName, code) {
      const template = messageTemplates.acceptance.replace('[TEAM_CODE]', code);
      document.getElementById('sendToTeam').value = teamName;
      document.getElementById('messageTemplate').value = template;
      document.getElementById('messageType').value = 'acceptance';
      
      if (confirm(`Send welcome message to ${teamName}?`)) {
        await sendMessage();
      }
    }

    // Initialize
    updateMessageTemplate();
    loadBatches();
    loadSubmissions();
    loadTeams();
    setInterval(refreshLog, 10000); // Refresh every 10 seconds
    setInterval(loadTeams, 30000); // Refresh teams every 30 seconds
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>orbit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;justify-content:space-between;align-items:center;padding:24px 32px}
.logo{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.5px}
.logo span{color:rgba(255,255,255,0.3)}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px 80px}
.pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:999px;padding:5px 14px;font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:0.04em;margin-bottom:32px}
.pill-dot{width:5px;height:5px;border-radius:50%;background:#a78bfa}
h1{font-size:clamp(36px,8vw,64px);font-weight:600;color:#fff;letter-spacing:-1.5px;line-height:1.05;max-width:600px;margin-bottom:20px}
h1 em{font-style:normal;color:rgba(255,255,255,0.3)}
.sub{font-size:17px;color:rgba(255,255,255,0.4);max-width:360px;line-height:1.6;margin-bottom:48px}
.cta{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#0a0a0a;border:none;border-radius:999px;padding:16px 32px;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;letter-spacing:-0.2px}
.imsg{width:22px;height:22px;background:#34c759;border-radius:6px;display:flex;align-items:center;justify-content:center}
.imsg svg{width:13px;height:13px;fill:white}
.chat{margin-top:56px;width:100%;max-width:300px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:18px 14px}
.chat-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:0.5px solid rgba(255,255,255,0.06)}
.av{width:34px;height:34px;border-radius:50%;background:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:14px;color:white;font-weight:600}
.cn{font-size:13px;font-weight:500;color:#fff}
.cs{font-size:11px;color:rgba(255,255,255,0.3)}
.msg{margin-bottom:6px;display:flex}
.them{justify-content:flex-start}
.me{justify-content:flex-end}
.bubble{max-width:78%;padding:7px 11px;border-radius:14px;font-size:12px;line-height:1.4}
.them .bubble{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);border-bottom-left-radius:3px}
.me .bubble{background:#7c3aed;color:#fff;border-bottom-right-radius:3px}
.typing{display:flex;align-items:center;gap:3px;padding:9px 12px;background:rgba(255,255,255,0.1);border-radius:14px;border-bottom-left-radius:3px;width:fit-content;margin-top:2px}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.footer{text-align:center;padding:20px;font-size:12px;color:rgba(255,255,255,0.12)}
</style>
</head>
<body>
<nav><div class="logo">orbit <span>&#10022;</span></div></nav>
<div class="hero">
  <div class="pill"><div class="pill-dot"></div>now on iMessage</div>
  <h1>see your people.<br><em>actually.</em></h1>
  <p class="sub">float a plan. your people get it. someone says yes. it happens.</p>
  <a class="cta" href="sms://open?address=+16175993308&body=hey orbit">
    <div class="imsg"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.04 2 11c0 2.76 1.28 5.23 3.31 6.93L4 22l4.35-1.45C9.4 20.83 10.67 21 12 21c5.52 0 10-4.04 10-9s-4.48-9-10-9z"/></svg></div>
    join your orbit
  </a>
  <div class="chat">
    <div class="chat-head">
      <div class="av">&#10022;</div>
      <div><div class="cn">orbit</div><div class="cs">iMessage</div></div>
    </div>
    <div class="msg them"><div class="bubble">hey! i'm orbit &#127769; what's your name?</div></div>
    <div class="msg me"><div class="bubble">Mariia</div></div>
    <div class="msg them"><div class="bubble">love that &#128155; tap to pick your people</div></div>
    <div class="msg me"><div class="bubble">berryline tonight??</div></div>
    <div class="msg them"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
  </div>
</div>
<div class="footer">orbit &#10022; made with love in boston</div>
</body>
</html>
